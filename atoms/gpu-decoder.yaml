# GPU Decoder Atom

Décodeur GPU multi-backend pour PLIX Suite.

## Paramètres

| Paramètre | Type | Défaut | Description |
|-----------|------|--------|-------------|
| `wrapper` | string | `nvdec_wrapper` | Backend CUDA/NVDEC |
| `build` | list | [] | Scripts de build |
| `exports` | list | [] | Bibliothèques exportées |
| `runtime` | list | [] | Dépendances runtime CUDA |

## Backends supportés

- **NVDEC_DLL** : NVIDIA NVDEC hardware decode (<5ms cible)
- **NVDEC_PYAV** : PyAV/FFmpeg avec CUDA hwaccel (~15ms)
- **OPENCV** : CPU fallback (validé ~15ms)

