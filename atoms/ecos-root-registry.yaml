# ECOS_ROOT Registry Atom

Pattern d'identité écosystémique décentralisé par dépôt.

## Rôle

Chaque dépôt de l'écosystème possède un fichier `ECOS_ROOT.json` qui définit son identité canonique :
- strate : classification hiérarchique (L0-L5)
- citizen : nom du citoyen/repo
- name : nom complet
- role : rôle fonctionnel
- status : statut (active/dormant/deprecated)
- layer : couche logique (N1-N4)
- section : section P0-P5

## Paramètres

| Paramètre | Type | Défaut | Description |
|-----------|------|--------|-------------|
| `required_fields` | list | `[]` | Champs obligatoires dans ECOS_ROOT.json |
| `optional_fields` | list | `[]` | Champs optionnels |

## Invariants

- Tout dépôt actif DOIT avoir un ECOS_ROOT.json valide
- Le champ `layer` DOIT correspondre à la strate dans known_repositories.yaml
- Le champ `section` DOIT être cohérent avec la priorité P0-P5

## Exemple d'usage

```json
{
  "strate": "L3_EMERGENCE",
  "citizen": "CANDIDATOR",
  "name": "CANDIDATOR",
  "role": "Gestion candidatures, CV, lettres",
  "status": "active",
  "layer": "L3_EMERGENCE",
  "section": "P1_STRATEGIC"
}
```

