# Latency Bound Atom

Capacité de design imposant une limite de latence P99.

## Paramètres

| Paramètre | Type | Défaut | Description |
|-----------|------|--------|-------------|
| `max_latency_ms` | int | `10` | Latence P99 maximale autorisée (ms) |

## Invariants

- Toute opération critique du design doit respecter `max_latency_ms`.
- En cas de dépassement, le design doit inclure un mécanisme de rétroaction (ex: backpressure, cache, ou optimisation PIANO).

## Exemple d'usage

```yaml
capabilities:
  - name: latency-bound
    parameters:
      max_latency_ms: 45
```

