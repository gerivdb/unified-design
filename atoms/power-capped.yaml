# Power Capped Atom

Capacité de design imposant une limite de consommation de puissance.

## Paramètres

| Paramètre | Type | Défaut | Description |
|-----------|------|--------|-------------|
| `max_power_w` | int | `150` | Puissance maximale autorisée (W) |

## Invariants

- Toute inférence ou opération matérielle doit respecter `max_power_w`.
- En cas de dépassement, le design doit inclure un mécanisme de régulation (ex:Dynamic Voltage Scaling, throttling).

## Exemple d'usage

```yaml
capabilities:
  - name: power-capped
    parameters:
      max_power_w: 12
```

