# Artifact Synced Loop Atom

Capacité de design pour les loops à artifacts synchronisés.

## Paramètres

| Paramètre | Type | Défaut | Description |
|-----------|------|--------|-------------|
| `artifact_kind` | string | `null` | Kind d'artifact (`file`/`html`) |
| `sync_scope` | string | `run` | `run` ou `loop` |

## Invariants

- Les artifacts sont taggés par `loopId` + `runId`.
- Un snapshot de run capture le manifest + blobs pour diff ultérieur.

