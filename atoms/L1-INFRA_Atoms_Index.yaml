  type: Principle
  description: "Atome parent pour les principes de conception fondamentaux (SOLID, DRY, KISS, YAGNI, etc.)."

- id: SRP
  file: unified-design/atoms/srp.yaml
  type: Principle
  description: "Single Responsibility Principle — chaque module/ classe a une seule raison de changer."
  intent_hash: "0xATOM_SRP_20260716"

- id: LSP
  file: unified-design/atoms/lsp.yaml
  type: Principle
  description: "Liskov Substitution Principle — les sous-types doivent pouvoir remplacer les types de base."
  intent_hash: "0xATOM_LSP_20260716"

- id: ISP
  file: unified-design/atoms/isp.yaml
  type: Principle
  description: "Interface Segregation Principle — les clients ne doivent pas être forcés à dépendre d'interfaces qu'ils n'utilisent pas."
  intent_hash: "0xATOM_ISP_20260716"

- id: DIP
  file: unified-design/atoms/dip.yaml
  type: Principle
  description: "Dependency Inversion Principle — les modules de haut niveau ne doivent pas dépendre des modules de bas niveau."
  intent_hash: "0xATOM_DIP_20260716"

- id: KISS
  file: unified-design/atoms/kiss.yaml
  type: Principle
  description: "Keep It Simple, Stupid — évitez la complexité inutile, préférez les solutions simples."
  intent_hash: "0xATOM_KISS_20260716"

- id: YAGNI
  file: unified-design/atoms/yagni.yaml
  type: Principle
  description: "You Aren't Gonna Need It — n'implémentez pas de fonctionnalités non demandées."
  intent_hash: "0xATOM_YAGNI_20260716"

- id: LAW_OF_DEMETER
  file: unified-design/atoms/law-of-demeter.yaml
  type: Principle
  description: "Law of Demeter — ne parlez qu'aux amis directs, évitez la navigation profonde."
  intent_hash: "0xATOM_LAW_OF_DEMETER_20260716"

- id: PRINCIPLE_OF_LEAST_ASTONISHMENT
  file: unified-design/atoms/principle-of-least-astonishment.yaml
  type: Principle
  description: "Principle of Least Astonishment — le code doit se comporter comme on s'y attend."
  intent_hash: "0xATOM_POLA_20260716"

- id: CONVENTION_OVER_CONFIGURATION
  file: unified-design/atoms/convention-over-configuration.yaml
  type: Principle
  description: "Convention over Configuration — établissez des conventions par défaut."
  intent_hash: "0xATOM_COC_20260716"

