# Think-Do-Check Atom

Pattern de paradigme ternaire Think-Do-Check.

## Rôle

Structure les requêtes TQL en 3 phases ternaires :
- **THINK** : diagnostic, vision, recherche
- **DO** : acquis, besoin, stratégie
- **CHECK** : écart, révision, alignement

## Paramètres

| Paramètre | Type | Défaut | Description |
|-----------|------|--------|-------------|
| `phases` | dict | - | Phases du paradigme |
| `recursion` | bool | `true` | Récursion auto-similaire |
| `max_depth` | int | `10` | Profondeur max |

## Invariants

- Chaque phase DOIT avoir 3 sous-phases
- La récursion EST optionnelle mais recommandée
- La profondeur max DOIT être respectée

## Exemple d'usage

```yaml
capabilities:
  - name: think-do-check
    parameters:
      phases:
        think: [diagnostic, vision, recherche]
        do: [acquis, besoin, strategie]
        check: [ecart, revision, alignement]
      recursion: true
      max_depth: 10
```

