# Strate Registry Atom

Capacité de design définissant la classification hiérarchique des dépôts.

## Paramètres

| Paramètre | Type | Défaut | Description |
|-----------|------|--------|-------------|
| `strates` | dict | {} | Classification L0-L5 avec règles |
| `global_rules` | list | [] | Règles de gouvernance transverses |

## Invariants

- Chaque dépôt doit appartenir à exactement une strate
- Les règles de gouvernance sont strictes par strate
- Les modifications de strate nécessitent un ADR

## Exemple d'usage

```yaml
capabilities:
  - name: strate-registry
    parameters:
      strates:
        L0_CANON:
          max_repos: 10
        L4_TOOLS:
          max_repos: 50
      global_rules:
        - "TOPOS/topology.yaml est la SOT"
```

