# Fractal Recursion Atom

Pattern de récursion fractale auto-similaire.

## Rôle

Implémente la récursion fractale pour les requêtes TQL :
- **Pattern** : auto-similaire
- **Opérateurs** : 12 cognitifs
- **Short-circuit** : NEUTRE (évite l'explosion combinatoire)
- **Complexité** : O(DELTA)

## Paramètres

| Paramètre | Type | Défaut | Description |
|-----------|------|--------|-------------|
| `pattern` | string | `self-similar` | Pattern de récursion |
| `operators` | int | `12` | Opérateurs cognitifs |
| `short_circuit` | string | `NEUTRE` | Mode short-circuit |
| `max_depth` | int | `10` | Profondeur max |
| `complexity` | string | `O(DELTA)` | Complexité théorique |

## Invariants

- Le short-circuit NEUTRE EST obligatoire (ADR-0013)
- La profondeur max DOIT être respectée
- La complexité DOIT rester O(DELTA)

## Exemple d'usage

```yaml
capabilities:
  - name: fractal-recursion
    parameters:
      pattern: self-similar
      operators: 12
      short_circuit: NEUTRE
      max_depth: 10
      complexity: O(DELTA)
```

## Références

- TQL (gerivdb/TQL)
- ADR-0013 (short-circuit NEUTRE)
