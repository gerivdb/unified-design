# Stratum Relay Atom

Pattern de documentation de relais de strate par dépôt.

## Rôle

Chaque dépôt peut avoir un fichier `STRATUM_RELAY.md` qui documente :
- Sa position dans la hiérarchie des strates
- Ses dépendances vers d'autres dépôts
- Les dépôts qui dépendent de lui
- Les bridges (connexions transverses)
- Les contraintes spécifiques

## Paramètres

| Paramètre | Type | Défaut | Description |
|-----------|------|--------|-------------|
| `strate` | string | - | Strates du dépôt (ex: L3-CITIZENS) |
| `role` | string | - | Rôle fonctionnel |
| `dependencies` | list | `[]` | Dépendances vers d'autres dépôts |
| `dependents` | list | `[]` | Dépôts dépendants |
| `bridges` | list | `[]` | Bridges transverses |
| `constraints` | list | `[]` | Contraintes spécifiques |

## Invariants

- Tout dépôt avec des dépendances cross-repo DOIT avoir un STRATUM_RELAY.md
- Le fichier DOIT être cohérent avec known_repositories.yaml
- Les bridges DOivent être documentés dans BRIDGES.yaml

## Exemple d'usage

```yaml
strate: L3-CITIZENS
role: Gestion candidatures, CV, lettres
dependencies:
  - gerivdb/ONTOLOGY
dependents:
  - gerivdb/FLUENCE
bridges:
  - type: MCP
    target: gerivdb/GATEWAY-MANAGER
constraints:
  - "Pas d'accès direct à NEXUS sans passer par GATEWAY-MANAGER"
```

