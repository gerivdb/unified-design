# Virtuous Cycle Loop

Pattern de boucle de rétroaction positive sur la performance.

## Description

Cette boucle documente comment l'observation (SDD) alimente l'adaptation (capabilities), qui à son tour déclenche l'optimisation (CD), refermant la boucle sur l'observation avec des métriques améliorées.

## Propriétés

- `virtuous: true` — boucle autorisée par le détecteur.
- `cycle_length: 3` — 3 nœuds dans le cycle.
- Aucun conflit sémantique détecté.

## Utilisation

Dans un design instanciant cette boucle :

```yaml
loops:
  - name: virtuous-cycle
    nodes:
      observation: SDD
      adaptation: latency-bound
      optimisation: CD
```

