# Deadlock Pattern Loop

Pattern de boucle vicieuse (incohérence) entre contraintes mutuellement exclusives.

## Description

Cette boucle documente un cas où deux capacités imposent des contraintes qui ne peuvent être satisfaites simultanément sur le matériel cible.

## Propriétés

- `virtuous: false` — boucle interdite par le détecteur.
- `cycle_length: 2` — 2 nœuds dans le cycle.
- `conflict: unsatisfiable` — aucune instanciation ne résout le conflit sans modification des paramètres.

## Résolution

Le méta-design doit signaler cette boucle et proposer :
1. L'augmentation d'un des paramètres.
2. L'introduction d'un pilier d'arbitrage (ex: Connard Design) pour trancher.

