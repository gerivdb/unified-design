name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML files
        run: python3 -c "import yaml; yaml.safe_load(open('meta-design.yaml')); print('OK')"

      - name: Check required files exist
        run: |
          ls -la README.md REPO.yaml citizens.yaml ONTOLOGY_DECLARATION.yaml .gitignore .rssignore docs/META-DESIGN.md
