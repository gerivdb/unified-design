name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate meta-design.yaml
        run: |
          python -c "import yaml; yaml.safe_load(open('meta-design.yaml'))"
          echo "✅ meta-design.yaml is valid YAML"
      
      - name: Validate META-DESIGN.md frontmatter
        run: |
          head -10 META-DESIGN.md | grep -q "---"
          echo "✅ META-DESIGN.md has valid frontmatter"
      
      - name: Check required files
        run: |
          test -f README.md && echo "✅ README.md exists"
          test -f REPO.yaml && echo "✅ REPO.yaml exists"
          test -f citizens.yaml && echo "✅ citizens.yaml exists"
          test -f ONTOLOGY_DECLARATION.yaml && echo "✅ ONTOLOGY_DECLARATION.yaml exists"
          test -f .gitignore && echo "✅ .gitignore exists"
          test -f .rssignore && echo "✅ .rssignore exists"